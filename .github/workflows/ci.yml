name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Pinned via .python-version so CI, local, and the Streamlit Cloud
          # deploy all target the same interpreter.
          python-version-file: .python-version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Import smoke check
        # Catches import/deploy breakage (e.g. a missing symbol) before it can
        # reach the live app, the way the v2.0 stale-deploy ImportError did.
        run: python -c "import app"
